<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 커리큘럼 로드맵 -->
     <header class="curriculum-header">
        <span class="curriculum-label">CURRICULUM</span>
        <h2 class="curriculum-title">커리큘럼 로드맵</h2>
     </header>
     <div class="curriculum-roadmap">
        <div class="roadmap-line"></div>
        <div class="roadmap-items">
            <article class="roadmap-item">
                <!-- 각 아이템 위에 놓일 동그라미 -->
                 <div class="roadmap-dot"></div>
                 <h3 class="roadmap-item-title">
                    <span class="curriculum-item-week">1-4주차</span>
                    UI 레이아웃
                 </h3>
                 <p class="curriculum-item-desc">HTML/CSS, Figma AI 활용 UI 설계</p>
            </article>
            <article class="roadmap-item">
                 <div class="roadmap-dot"></div>
                 <h3 class="roadmap-item-title">
                    <span class="curriculum-item-week">5-9주차</span>
                    JS & 프로그래밍
                 </h3>
                 <p class="curriculum-item-desc">JavaScript, 알고리즘</p>
            </article>
            <article class="roadmap-item">
                 <div class="roadmap-dot"></div>
                 <h3 class="roadmap-item-title">
                    <span class="curriculum-item-week">10-13주차</span>
                    React 앱 개발
                 </h3>
                 <p class="curriculum-item-desc">리액트, TypeScript</p>
            </article>
            <article class="roadmap-item">
                 <div class="roadmap-dot"></div>
                 <h3 class="roadmap-item-title">
                    <span class="curriculum-item-week">14-17주차</span>
                    백엔드 기초
                 </h3>
                 <p class="curriculum-item-desc">성능 최적화, Firebase/Supabase</p>
            </article>
            <article class="roadmap-item">
                 <div class="roadmap-dot"></div>
                 <h3 class="roadmap-item-title">
                    <span class="curriculum-item-week">18주차</span>
                    최종 프로젝트
                 </h3>
                 <p class="curriculum-item-desc">최종 서비스 런칭 및 현직자 취업 특강</p>
            </article>
        </div>
     </div>
     <a href="#" class="btn btn-secondary">커리큘럼 더보기</a>
</body>
</html>
