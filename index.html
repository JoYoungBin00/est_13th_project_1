    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/index.css">

 <title>EST Camp</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      background:#f5f5f5;
    }

    /* blue block */

    .banner{
      width:100%;
      height:320px;
      background:linear-gradient(135deg,#081a52,#1f4ed8,#6d28d9);
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
    }

    .banner-content{
      text-align:center;
    }

    .banner-content h1{
      font-size:48px;
      margin-bottom:20px;
    }

    .banner-content p{
      font-size:22px;
      margin-bottom:25px;
    }

    .banner-content button{
      padding:12px 30px;
      border:none;
      border-radius:30px;
      background:white;
      color:#1f4ed8;
      font-weight:bold;
      cursor:pointer;
    }

    /* 밑블럭 */

    .content{
      width:1100px;
      margin:50px auto;
      background:white;
      padding:50px;
      border-radius:20px;
      box-shadow:0 4px 15px rgba(0,0,0,0.1);
    }

    .content h2{
      font-size:36px;
      margin-bottom:20px;
      color:#111;
    }

    .content p{
      color:#666;
      line-height:1.7;
      margin-bottom:30px;
    }

    .cards{
      display:flex;
      gap:25px;
    }

    .card{
      flex:1;
      background:#f0f4ff;
      padding:30px;
      border-radius:15px;
    }

    .card h3{
      margin-bottom:15px;
      color:#1f4ed8;
    }

  </style>
</head>

<body>

  <!-- blue block -->

  <div class="banner">

    <div class="banner-content">

      <h1>EST CAMP</h1>

      <p>
        2026 인공지능사관학교<br>
        7기 교육생 모집
      </p>

      <button>보러가기</button>

    </div>

  </div>

  <!-- 밑블럭 -->

  <div class="content">

    <h2>이스트소프트 부트캠프</h2>

    <p>
      실무 중심 프로젝트와 AI 기반 웹 개발 교육을 진행합니다.
    </p>

    <div class="cards">

      <div class="card">
        <h3>프론트엔드 과정</h3>
        <p>HTML CSS JavaScript 학습</p>
      </div>

      <div class="card">
        <h3>백엔드 과정</h3>
        <p>서버와 데이터베이스 개발</p>
      </div>

      <div class="card">
        <h3>AI 프로젝트</h3>
        <p>AI 활용 실전 프로젝트</p>
      </div>

    </div>

  </div>

</body>
</html>
<!-- //최이리나 -->
</body>
</html>
